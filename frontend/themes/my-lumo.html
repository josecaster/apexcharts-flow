<custom-style>
    <style>

html {
            --lumo-border-radius: 0.5em;
            --lumo-space-xl: 2.5rem;
            --lumo-space-l: 1.75rem;
            --lumo-space-m: 1.125rem;
            --lumo-space-s: 0.75rem;
            --lumo-space-xs: 0.375rem;
            --lumo-base-color: #f6f6f7;
            --lumo-light-base-color: var(--lumo-primary-contrast-color);

            --lumo-header-text-color: hsl(233, 81%, 10%);
            --lumo-body-text-color:hsla(233, 81%, 10%, 0.94);
            --lumo-secondary-text-color:hsla(233, 81%, 10%, 0.69);
            --lumo-tertiary-text-color:hsla(233, 81%, 10%, 0.52);
            --lumo-disabled-text-color:hsla(233, 81%, 10%, 0.26);

}

[theme~="dark"] {
}


    </style>
</custom-style>


<dom-module id="text-field-style" theme-for="vaadin-text-field">
    <template>
        <style>[part="input-field"]{box-shadow:inset 0 0 0 1px var(--lumo-contrast-30pct);background-color:var(--lumo-base-color);}:host([invalid]) [part="input-field"]{box-shadow:inset 0 0 0 1px var(--lumo-error-color);}

        </style>
    </template>
</dom-module>
